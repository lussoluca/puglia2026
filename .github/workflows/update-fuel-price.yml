name: Update Fuel Price

on:
  schedule:
    # Run daily at 09:00 UTC (MIMIT updates by 08:30 Italian time)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fuel-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update fuel price from MIMIT
        run: bash scripts/update-fuel-price.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/budget.json src/data/auto/budget.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/budget.json src/data/auto/budget.json
          git commit -m "chore: update diesel and GPL prices from MIMIT open data"
          git push
